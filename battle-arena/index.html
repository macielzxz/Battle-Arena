<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚔️ BATTLE ARENA — Singleton + Factory</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="game-title">⚔️ Battle Arena ⚔️</div>
    <div class="pattern-label">Singleton Pattern · Factory Pattern · Design Gamer</div>
  </header>

  <div class="arena">
    <div class="arena-label">⬛ Campo de Batalha ⬛</div>

    <div class="enemies-grid" id="enemiesGrid"></div>

    <div class="vs-divider">
      <div class="vs-line"></div>
      <div class="vs-badge">VS</div>
      <div class="vs-line"></div>
    </div>

    <div class="player-zone" id="playerZone">
      <div class="player-avatar-wrap">
        <span class="player-emoji" id="playerEmoji">🧙‍♂️</span>
        <span class="singleton-badge">SINGLETON</span>
      </div>
      <div class="player-info">
        <div class="player-name"  id="playerName">Arcanus</div>
        <div class="player-class">⟨ Mago Supremo ⟩</div>
        <div class="player-stats-row">
          <div class="pstat atk">ATQ <span id="playerAtk">—</span></div>
          <div class="pstat def">DEF <span id="playerDef">—</span></div>
          <div class="pstat">MAX HP <span id="playerMaxHp">—</span></div>
        </div>
        <div class="player-hp-wrap">
          <div class="player-hp-label-row">
            <span class="player-hp-tag">VIDA</span>
            <span class="player-hp-num" id="playerHpNum">—</span>
          </div>
          <div class="player-hp-track">
            <div class="player-hp-fill" id="playerHpFill" style="width:100%"></div>
          </div>
        </div>
        <div class="player-status-msg" id="playerMsg">Pronto para o combate…</div>
      </div>
    </div>
  </div>

  <div class="log-area">
    <div class="log-title">📜 Log de Batalha</div>
    <div class="log-list" id="logList"></div>
  </div>

  <div class="overlay-screen" id="overlayScreen">
    <div class="overlay-big" id="overlayTitle"></div>
    <div class="overlay-sub"  id="overlaySub"></div>
    <button class="btn-restart" onclick="restartGame()">↺ Jogar Novamente</button>
  </div>

  <script src="js/sfx.js"></script>
  <script src="js/game.js"></script>

</body>
</html>
